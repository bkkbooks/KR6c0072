body:
  text: 秀水止菴王起隆述承以金剛演說示讀竊嘆翁兄於古今疏經家揉諸香為丸緝眾絲成錦樂取人善不恃己長留心大乘最上乘為當今之優曇鉢華儒門大有人在矣疏經難疏此經大難疏此經如時師為他人說者亦不為難疏此經而期精熟貫穿不失佛意不同謗佛則難之大難寧觀大意無師心也寧闕疑無妄註脚也全經五千一百四十六字耳昭明分三十二分留支分十二分無著分十八住天親分二十七疑彌勒成八十偈功德施菩薩造論傅大士造頌等度佛眼觀之盡虗空界畫也相傳唐初疏此經者多至八百餘家世遠不可得見前此則天台智者之疏後此則圭峯之纂楊圭之集解長水之刊定記中峯之略義宗泐之註暨今時疏亦既充棟將赤水玄珠誰定為象罔乎原夫般若大經次阿含方等而說凡六百卷四處十六會金剛般若為第九會說其一也金剛般若之入中國前後譯凡有六而秦譯其一也經有大頭顱有大支幹而血髓充周圓滿於其間大頭顱云何經所謂金剛非他即生佛真如心是也此真如心不變隨緣隨緣不變不變者生佛同此真如心刀砍不入火燒不著能壞一切而一切不能壞故般若有百喻此單喻如金剛亦得強名曰無為法隨緣者一切聖凡依正皆以無為法而有差別名有為法喻如夢幻泡影露電不可取著則屬生滅門收矣弟於此經素苦葛藤迄今老於憂患讀之略見一斑與深言之無寧淺言之與玄遠言之無寧平實言之全經文句諄諄娓娓疊疊層層如關鎻勾連之骨如迴環顧抱之沙畢竟頭顱何在則經文佛不云乎一切法無我竊謂此經五千一百四十六字只疏得此五字耳心佛眾生三無差別真如不守動生無明只一我為大患我相也我見也我能度生也我能布施也我能得果也我能說法也我能授記也我能莊嚴佛土也我能供養河沙諸佛也我能捨身命也我能持戒也我能忍辱也我能行善法也我能集福德也此點點我未忘由此貪著我執法執法非法執貪著正報執貪著依報執矜功爭能也伐善施勞也希求福利也為尊貴施墮也為人輕賤也鬬諍堅固也此所謂一合相也此所謂諸心皆非心也此所謂住於非住而不住於般若也此所謂為煩惱伏降而不能降伏煩惱也我如堅城如怨敵千生萬劫圍合堅牢如人入暗一無所見矣誠有能發菩提心生清淨心不住六塵生心應無所住生心於一切有為法凡度生布施得果說法嚴土持戒忍辱集福等洞然智照觀度而無所度觀施而無所施觀得而無所得觀說而無所說觀記而無所記觀嚴而無所嚴觀供而無所供觀身命而無身命觀持戒而無持戒觀忍辱而無忍辱觀善法而無善法觀福德而無福德觀微塵而無微塵觀世界而無世界觀四相無四相觀四見無四見盡聖凡依正統滙一真如即有為法而成無為法即假設我而見真常我旅泊世間無意必無固我於凡矜功爭能貪著之薰習之命根徹盡源底豁然蕩除如日光明照見種種色即堅城粉碎矣怨敵倒戈矣心心般若在在金剛為至人無己神人無功聖人無名矣故曰菩薩通達無我法者如來說名真是菩薩此於全經大頭顱未敢曰穿透紅心或者雖不中不遠乎大支幹云何一曰循經分以省謗一曰標經旨以舉要一曰約經象以順文一曰匯經意以領趣一曰開經眼以豁疑循經分何也全經問在答處答在問處髣髴神龍出沒不可端倪但點睛之手畫龍身首凡繚繞烟雲間者不必盡畫也茲循昭分細審來龍自第二分須菩提從大眾中起至第四分菩薩但應如所教住止為經全龍之龍首葢住心降伏義為正宗如大學之聖經中庸之天命章全經大旨已竟自第五分可以身相見如來不起至第十六分果報亦不可思議止如學庸之有分章只重重洗發住心降伏之義自十七分起空生重理住心降伏起請問頭諸家種種曲說虗心尋繹俱未確然此正如南華經北溟有魚一則兩見逍遙一篇之中文字重彰趣味無二也循此十七分中重說無法可得重說大身非身重說莊嚴非莊嚴第十九分重說布施福德第二十分重說不可身相見如來第二十一分重說如來無所說法第二十四分重說說經福德第二十五分重說實無眾生滅度第二十六分重說不可三十二相見如來第三十分重說非微塵非世界其他不重說者亦字句多重葢緣印度言音累複佛慈悲重深不違其俗故無相無見無說無得無度無福德等言或三五出或八九出或為鈍根諄誨或為後至重宣不厭再三實無岐異加之或翻譯之失或筆受之訛但當牢持信心求佛加被自當有庖丁解牛披大却導大之時若如諸家必欲爭執前後不同可解解之不可解處亦必欲解之牽強消文橫生穿鑿疑團滿堆佛口通可掛壁果知其解者旦暮遇之乎自非不謬佛心誹謗重𠍴奚通懺悔此經分之當循也標經旨何也諸經發起必有綱宗是經佛於般若會上破相談空以無上正等正覺開演人空法空法非法空彼凡夫不能斷惑二乘不能轉識其故有二繇一住於證得一住於福德耳初祖西來埽證得則曰廓然無聖埽福德則曰並無功德竊謂此經佛旨簡要亦然通玩經文如無得無說也我不作是念是阿羅漢也於燃燈佛所於法實無所得也於三藐三菩提無有少法可得也實無有法發菩提心也色見聲求為邪道也非所謂廓然無聖者歟福德同虗空不可思量也三千大千七寶施不及也身命布施不及也恒河沙身命三時布施不及也供養那由他諸佛功德不及也是福德即非福德性也諸菩薩不受福德也非所謂並無功德者歟佛憫小乘為有所得心所誤愚迷凡夫為人天小果有漏之因所誤墮存我覺我煩惱所知二障墮界內界外分段變易二死從生至生不得清淨不憚多方淘汰譬滌淨器方貯天漿趙州所云佛之一字我不喜聞龐蘊所謂我百千生為布施累意亦猶是此經旨之當標也約經象何也分經必以三科有序分有正宗末乃有結經流通此經第十三分空生請佛安名結經在半凡讚法顯勝處即係流通不係經末方為流通約象分文每段說經一番便間以較量福德一番通計七重福德第一重無住福德為見性福德次五重福德一重增勝一重通為有相福德較見性福德實算數比喻不及後四段則佛隨順機緣破遣凡夫依正報執末一切有為法一偈則總收全經故不分正宗不分流通護念付囑婆心痛切庠序秩如似乎貫華似乎散華似乎正智似乎方便似乎山盡水窮似乎坐看雲起此經象之當約也匯經意何也凡佛說經循其言句則知其意是經以金剛命名而經言則曰無諍曰忍辱曰無瞋恨曰受輕賤曰得成於忍則非以剛為剛純以柔為剛此佛意也佛言如來無所說法如來無有定法可說如來無法可說若言如來有所說法即為謗佛而經言則重信解受持重書寫誦讀重受持四句偈等曰為他人說者四曰為人解說者二曰廣為人說者一曰為人演說者一又曰如來為發大乘者說為發最上乘者說又曰如來是真語實語如語不誑語不異語豈說時默默時說如來有自語相違乎何以無法可說者又專欲人說所謂無離文字說解脫雖復不依言語道亦復不著無言說此佛意也經言凡有所相皆是虗妄言若見諸相非相即見如來言離一切諸相即名諸佛而又曰一切諸法皆是佛法又曰一切諸佛法皆從此經出又曰以無我無人無眾生壽者修一切善法又曰發阿耨多羅三藐三菩提心者於法不說斷滅相又曰成就最上第一希有之法又曰成就第一希有功德又曰成就無量無邊功德又曰成就不可量不可稱無有邊不可思議功德又曰佛法無實無虗將立時埽埽時立如來有世間過乎無非揀盡相見之虗彰明般若之實此佛意也經言一切眾生皆以無餘涅槃而滅度之但十界唯心眾生幻妄同於揑目所成人於相見不能清淨則起念便生無量眾生自己不離眾生何以度眾生乎故他經佛告比丘汝等心中一日一夜有百千萬億眾生起滅若能智照不起相續之念即是度盡眾生則知眾生有事度有理度有度世界之眾生有度自心之眾生有攝而順度眾生有折而逆度眾生並由理具方有事用必內外智照如儒之盡人盡物乃為無餘涅槃不同小乘樂小法者故曰一切眾生即非眾生曰彼非眾生非不眾生曰如來說非眾生是名眾生曰實無眾生如來度者此佛意也凡此等語如水面葫蘆按捺不定如明珠走盤閃爍橫斜如揮運鏌鎁縱奪殺活莫敢攖鋒但默領佛心自見趣味汪洋萬川歸𭏟了無異水此經意之當匯也開經眼何也佛於空生數云於意云何數云如是如是此經中眼目也將空生真有疑於佛耶抑佛真有疑於空生耶要知佛無疑也空生亦無疑也一部金剛翻翻覆覆代眾生作問答代眾生開疑也眾生不疑不信不大疑不大信故經中徹首徹尾最重信心如信心不逆如於此章句能生信心如一念生淨信心如聞是經不怖不畏如或有人聞心則狂亂狐疑不信其最嚴重則曰信心清淨則生實相實相即金剛也即能壞一切一切不能壞也即太阿鋒即大火聚即光明鏡即大日輪即楞嚴之究竟堅固即圓覺之非幻不滅即法華之是法住法位世間相常住有為法空也非空無為法也諸相非相也非空如來也色見聲求邪道也非空正道也灼然離一切相即一切法也灼然幻有不有真空不空也故始之以如是住如是降伏終之以如是知如是見如是信解如是觀而眾生無餘疑矣胥得度矣若執空生有疑佛真為空生破疑殊為未夢現在此經眼之當開也綜而論之一經之中有凡夫相見有二乘相見有相似菩薩相見凡夫相見見思惑也二乘相見塵沙惑也相似菩薩相見無明惑也相見之惑有從分別發起有從俱生發起分別二障麤猛易斷極喜無也俱生二障纏眠難斷地地除也離四句絕百非中有函葢乾坤句有截斷眾流句有隨波逐浪句佛說般若波羅蜜函葢乾坤也即非般若波羅蜜截斷眾流也是名般若波羅蜜隨波逐浪也引而伸之觸而類之所謂擊首尾應擊尾首應擊中則首尾俱應孰非經龍之鱗翼脊𩮻為大支幹者乎解此則全經血髓智見智仁見仁隨拈一字一句充周圓滿不可云喻更無不節節支解者矣要之此金剛王寶覺以如如不動為體以無餘度生降伏其心為用以不住六塵無住生心為同虗空不可思量福德以知一切法無我為得成於忍以是法平等無有高下脩一切善法為莊嚴以無相無見為證得以六如為觀智而最先證入全性起修全修在性則必以信為入門凡佛所說六度四果五眼三心身如須彌山王轉輪聖王諸類無字不當尋義無義不當求證貴眼正尤貴行履於佛菩薩所云如幻金剛三昧所云金剛道後異熟識空庶幾其可躋乎若口口談空心心著有如今之拍盲禪佀戲論講師背毀金剛墮落惡道必矣古德云但願空諸所有慎勿實諸所無此諸家之說金剛也古德又云寧起有見如丘山莫起無見如芥子則不肖弟之說金剛也橫成嶺側成峯到處不同正緣身在廬山不能全見廬山面目六祖曰此在心行不在口念張無盡曰我學佛而後知儒此經非足目兼資同堂面話何以頭正尾正領取本地風光倘兄翁不棄蒭蕘新年肯來酧唱激揚當更有依義不依語者相商不淺耳率臆妄言未罄瞽愚台慈不罪善信李肇亨助銀壹兩朱茂時張晉徵汪挺各助銀捌錢徐機助梨板肆錢刊此金剛大意所願同明相見之妄咸生清淨之心福基命位當體昌隆智種靈苗後嗣秀盛旃蒙恊洽林鍾月大士成道日王起隆謹識板貯楞嚴流通金剛大意自䟦此余甲午冬杪草答屠息庵書也因息庵下問不靳再三感其至誠遂呵凍滾滾成此一長篇絡索師心臆妄慮犯謗佛重𠍴擬欲今夏齎貭於靈峯素大師丐其楷定乃用示人故併息庵來索看未之敢出不謂首春大師西逝已求郢削無從生盲蔽錮永失金鎞可勝傷痛念息庵之意不可終虗適闔戶避兵將此書分錄三通一焚告素大師因不知所裁冀常光照證也一貽息庵因詢於蒭蕘不可忘酧答也一存笥中則藉以將來就正有道也嗟乎此經大意難明正繇高談龍肉人多實噉猪肉人少既頭顱之罔揭亦支幹之莫分每每以穿鑿心測佛智以瞞盰儱侗話消經文無瘡剜肉多歧亡羊所以童習白紛槩乎受病余廣閱諸解亦既有年體會久之稍窺端緒茲據經說經直抒所見不敢遺諸解不敢狥諸解不敢違執經佛冤之訓不敢背離經魔說之誡緬惟佛意昭然人自求之玄遠有能解粘釋縛觀照全經我意西乾東魯心理一如佛之無我即儒聖之何有空空佛之度生即至誠之盡性參贊降伏其心即論語克己為仁之的旨無住生心即大易何思何慮之真詮掃四相見通於毋意必固我蕩滌凡小執心不入斷滅通於朝聞夕死驅除迷蔽邪見無法可說豈非予欲無言無行不與之宗傳是法平等豈非夫婦知能渾同聖人之玅理無實無虗豈非顯諸仁藏諸用費而隱之聖諦莫作是念豈非我無能我豈敢大而化之玄風荷擔菩提豈非憲章祖述在茲之仔肩成就希有豈非繼往開來木鐸之功業不受福德豈非浮雲富貴有天下不與之胸襟得成於忍豈非削跡伐檀斯人我徒之願力夫道一而已矣何梵何夏何佛何儒何淺何深何世出世大開智眼作如是觀則下學便是上達藏通便是別圓看教便可見宗知儒便可識佛余德慧尠薄埒屋中愚然懷之已久抒洩於今下筆之時一湧齊出十目視十手指實不敢吐口不如心筆不如口有欺片語則時節因緣息庵之大有起發於我也儒佛兩門之賢者之交罪我乎或原我乎總不暇護也昔黃梅曹谿相傳以金剛印心為宗門龍穴其為人演說則曰但用此心直了成佛而昭明分分方便鈍根曩已有耆宿雪其是功非罪者余言平淡無能為大乘最上乘闡揚只堅信儒佛心同理同則心言俱直當為佛菩薩聖賢悉見悉知至於貫穿經文嫌於破碎虗空無所迯罪亦因散錢索子為初機之權設而然竊引昭明之例或尚可通懺悔乎深願見聞是書者無督過余援儒入佛昧殊塗同歸之性與天道則至幸矣旹乙未午月朔日東海止庵王起隆自識於深息草堂
